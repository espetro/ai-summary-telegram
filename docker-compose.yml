services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cib-postgres
    environment:
      POSTGRES_DB: cib
      POSTGRES_USER: cib
      POSTGRES_PASSWORD: cib
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cib -d cib"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
